# docker-compose.dev.yml — Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:

  backend:
    build:
      target: dev                     # use the 'dev' stage from Backend/Dockerfile
    image: myapp-backend:dev
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env.dev
    volumes:
      - ./Backend:/app                # bind-mount for hot-reload
      - /app/venv                     # anonymous vol shadows venv so host venv isn't mounted

  frontend:
    build:
      target: dev                     # use the 'dev' stage (Vite dev server)
    image: myapp-frontend:dev
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.dev
    volumes:
      - ./frontend:/app               # bind-mount for Vite HMR
      - /app/node_modules             # anonymous vol shadows node_modules
