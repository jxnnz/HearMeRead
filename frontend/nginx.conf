server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Prevent MIME-type sniffing (stops browsers from interpreting files as a
    # different type than declared, mitigating drive-by download attacks)
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking by disallowing embedding in iframes
    add_header X-Frame-Options "DENY" always;

    # Enable XSS filter built into most browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Only allow resources from same origin and explicitly trusted sources
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Tell browsers to always use HTTPS (enable after setting up SSL)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Restrict browser features the app doesn't need
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # ── Block access to source map files ──────────────────────────────────────
    # Even if source maps are accidentally included in the build, this prevents
    # browsers from downloading them (hides folder structure and source code)
    location ~* \.map$ {
        return 404;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend container
    # The trailing slash on proxy_pass strips the /api prefix before forwarding
    # e.g. /api/users/login  →  http://backend:8000/users/login
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
