# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:

  backend:
    build:
      target: prod                    # prod stage: non-root user, 4 workers
    image: myapp-backend:prod
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env.prod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend:
    build:
      target: prod                    # prod stage: Nginx serving compiled dist/
      args:
        VITE_API_URL: /api            # relative path — Nginx proxies /api/* to backend
    image: myapp-frontend:prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates (e.g. from Certbot / Let's Encrypt)
      # Place your cert files at ./ssl/fullchain.pem and ./ssl/privkey.pem
      - ./ssl:/etc/nginx/ssl:ro
    env_file:
      - ./frontend/.env.prod
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

